                    let correctedText = text;
                    for (const [orig, pron] of Object.entries(this.dict)) {
                        correctedText = correctedText.split(orig).join(pron);
                    }

                    const utterance = new SpeechSynthesisUtterance(correctedText);
                    utterance.lang = 'zh-TW';
                    
                    if (this.voiceURI) {
                        const voices = window.speechSynthesis.getVoices();
                        const selectedVoice = voices.find(v => v.voiceURI === this.voiceURI);
                        if (selectedVoice) utterance.voice = selectedVoice;
                    }
                    window.speechSynthesis.speak(utterance);
                }
            },
            stop: function() {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }
            }
        };

        const parseCSV = (text) => {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.length > 1 || r[0].trim() !== '');
        };

        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        const MAX_HEIGHT = 600;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        };

            const tryModel = async (modelName) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${cleanKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                if (!data.candidates || data.candidates.length === 0) throw new Error("AI 無回傳結果");
                return data.candidates[0].content.parts[0].text;
            };

            try { return await tryModel('gemini-1.5-flash'); }

                try { return await tryModel('gemini-2.5-flash-preview-09-2025'); }

                        let finalTranscript = '';
                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;

            const handleBullets = async () => {
                if (!apiKey?.trim()) return showAlert("老師尚未設定 AI 金鑰，無法使用重點條列。");
                if (!value.level2.trim() && !value.level1.trim()) return showAlert("沒有內容可以轉條列！");
                setLoading(true); setLoadingType('bullet');
                try {
                    const bullets = await getBullets(value.level2 || value.level1, apiKey);
                    onChange({ ...value, level2: bullets, level3: bullets, stage: 'bullet' });
                } catch (e) { showAlert("重點條列失敗：" + e.message); }
                setLoading(false); setLoadingType('');
            };

            return (
                <div className="mb-6 p-4 border-2 border-serenity/30 rounded-xl bg-white shadow-sm">
                    <div className="flex justify-between items-start mb-2">
                        <h3 className="font-bold text-lg text-serenity flex items-center gap-2">
                            <span className="bg-serenity text-white rounded-full min-w-[2rem] px-2 h-8 flex items-center justify-center whitespace-nowrap shadow-sm">{field.id.length > 2 ? field.id.substring(0,2) : field.id}</span>
                            {field.title}
                        </h3>
                        <button onClick={() => TTS.speak(field.guide)} className="text-gray-400 hover:text-serenity p-1" title="朗讀引導語"><Icons.Speaker /></button>
                    </div>
                    <p className="text-sm text-gray-600 mb-4 ml-10">{field.guide}</p>

                    <div className="ml-10 space-y-4">
                        <div className={`transition-all ${value.stage !== 'raw' ? 'opacity-70' : ''}`}>
                            <label className="block text-xs font-bold text-gray-400 mb-1">
                                {value.stage !== 'raw' ? '原始想法 (已鎖定)' : '請輸入或錄音您的想法'}
                            </label>
                            <div className="relative">
                                <textarea
                                    className={`w-full p-3 pb-14 rounded-lg border-2 ${value.stage === 'raw' ? 'border-serenity focus:ring-2 focus:ring-serenity focus:border-transparent' : 'border-gray-200 bg-gray-50'} resize-y min-h-[120px]`}
                                    placeholder="點擊麥克風說話、上傳照片，或直接在這裡打字..."
                                    value={value.level1}
                                    onChange={(e) => handleTextChange(e, 'level1')}
                                    readOnly={value.stage !== 'raw'}
                                />
                                {value.stage === 'raw' && (
                                    <div className="absolute bottom-3 right-3 flex gap-2">
                                        <label className={`p-2 rounded-full text-white shadow-md transition-colors cursor-pointer flex items-center justify-center ${loading ? 'bg-gray-400' : 'bg-serenity hover:bg-blue-500'}`} title="上傳照片">
                                            {loading && loadingType === 'image' ? <span className="text-xs px-2 font-bold animate-pulse">處理中</span> : <Icons.Camera />}
                                            <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" disabled={loading} />
                                        </label>
                                        <button onClick={toggleRecording} className={`p-2 rounded-full text-white shadow-md transition-colors ${isRecording ? 'bg-red-500 animate-pulse' : 'bg-serenity hover:bg-blue-500'}`} title={isRecording ? "停止錄音" : "語音輸入"} disabled={loading}>
                                            <Icons.Mic />
                                        </button>
                                    </div>
                                )}
                            </div>
                            {value.imageUrl && (
                                <div className="mt-3 relative inline-block">
                                    <img src={value.imageUrl} alt="上傳的圖片" className="max-h-60 rounded-lg shadow-sm border border-gray-200" />
                                    {value.stage === 'raw' && (
                                        <button onClick={() => onChange({ ...value, imageUrl: null })} className="absolute -top-3 -right-3 bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-lg hover:bg-red-600 font-bold" title="移除照片" type="button">X</button>
                                    )}
                                </div>
                            )}
                        </div>

                        {value.stage === 'raw' && value.level1.trim().length > 0 && (
                            <div className="flex gap-2 justify-end mt-2">
                                <Button onClick={handleSummary} variant={apiKey?.trim() ? "secondary" : "outline"} className={`text-sm py-1 min-w-[120px] ${!apiKey?.trim() ? 'opacity-50 cursor-not-allowed border-gray-300 text-gray-400' : ''}`} disabled={loading || !apiKey?.trim()} title={!apiKey?.trim() ? "老師尚未開放 AI 功能" : ""}>
                                    {loading && loadingType === 'summary' ? <span className="animate-pulse">✨ AI 處理中...</span> : <><Icons.Magic /> 🌟 魔法摘要 {!apiKey?.trim() && '(未開放)'}</>}
                                </Button>
                            </div>
                        )}

                        {value.stage !== 'raw' && (
                            <div className="mt-4 p-4 bg-pink-50 border-2 border-quartz rounded-lg relative animate-fadeIn shadow-inner">
                                <div className="absolute -top-3 left-4 bg-quartz px-3 py-0.5 text-xs font-bold rounded-full text-gray-700 shadow-sm border border-pink-300">
                                    {value.stage === 'summary' ? '✨ AI 魔法摘要 (請手動校對)' : '🎯 AI 重點條列 (請手動校對)'}
                                </div>
                                <p className="text-xs text-gray-500 mb-2 mt-2 font-bold">
                                    💡 這是 AI 幫你整理的內容，可以直接在這裡修改成你真正想說的話喔！
                                </p>
                                <textarea
                                    className="w-full p-3 rounded-lg border-2 border-quartz focus:ring-2 focus:ring-pink-400 outline-none resize-y min-h-[100px] bg-white text-gray-800"
                                    value={value.level3}
                                    onChange={(e) => handleTextChange(e, 'level3')}
                                />
                                <div className="flex gap-2 justify-end mt-3">
                                    <Button onClick={() => onChange({ ...value, stage: 'raw', level3: value.level1 })} variant="outline" className="text-xs py-1 px-3 border-gray-400 text-gray-500 hover:bg-gray-100 bg-white">重來</Button>
                                    {value.stage === 'summary' && (
                                        <Button onClick={handleBullets} variant={apiKey?.trim() ? "secondary" : "outline"} className={`text-xs py-1 px-3 min-w-[120px] ${!apiKey?.trim() ? 'opacity-50 cursor-not-allowed border-gray-300 text-gray-400' : ''}`} disabled={loading || !apiKey?.trim()} title={!apiKey?.trim() ? "老師尚未開放 AI 功能" : ""}>
                                            {loading && loadingType === 'bullet' ? <span className="animate-pulse">✨ AI 處理中...</span> : <><Icons.List /> 🎯 轉成條列重點 {!apiKey?.trim() && '(未開放)'}</>}
                                        </Button>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // View Components
        // ==========================================
        const LoginView = ({ setUser, setView, setShowTutorial, adminPwd, showAlert }) => {
            const [name, setName] = useState('');
            const [pwd, setPwd] = useState('');
            const [showAdminLogin, setShowAdminLogin] = useState(false);

            const handleStudentLogin = () => {
                if (!name.trim()) return showAlert('請輸入姓名！');
                setUser(name.trim()); setView('dashboard');
                if (!localStorage.getItem(`tut_${name.trim()}`)) setShowTutorial(true);
            };

            const handleAdminLogin = () => {
                if (pwd === adminPwd) { setUser('admin'); setView('admin'); } 
                else { showAlert('密碼錯誤！請重新輸入。'); }
            };

            return (
                <div className="flex items-center justify-center min-h-screen p-4">
                    <Card className="w-full max-w-md text-center border-t-8 border-t-serenity shadow-2xl">
                        <h1 className="text-3xl font-bold text-serenity mb-2 mt-4">想法討論板</h1>
                        <p className="text-gray-500 mb-8 font-bold">用多元的框架，整理你的想法</p>
                        {!showAdminLogin ? (
                            <div className="space-y-4">
                                <input type="text" className="w-full p-4 border-2 border-quartz rounded-xl text-center text-xl focus:outline-none focus:border-serenity font-bold text-gray-700 bg-gray-50 focus:bg-white transition-colors" placeholder="請輸入你的名字" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleStudentLogin()} />
                                <Button onClick={handleStudentLogin} className="w-full text-lg py-4 shadow-md">進入討論板</Button>
                                <button onClick={() => setShowAdminLogin(true)} className="text-sm text-gray-400 mt-4 hover:text-gray-600 underline font-bold">我是老師 (後台登入)</button>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-fadeIn">
                                <input type="password" className="w-full p-4 border-2 border-gray-300 rounded-xl text-center text-xl focus:outline-none focus:border-gray-500 font-bold bg-gray-50 focus:bg-white transition-colors" placeholder="請輸入後台密碼" value={pwd} onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdminLogin()} />
                                <Button onClick={handleAdminLogin} variant="secondary" className="w-full text-lg py-4 shadow-md bg-gray-700 text-white hover:bg-gray-800 border-none">登入後台</Button>
                                <button onClick={() => setShowAdminLogin(false)} className="text-sm text-gray-400 mt-4 hover:text-gray-600 underline font-bold">返回學生登入</button>
                            </div>
                        )}
                    </Card>
                </div>
            );
        };

        const DashboardView = ({ user, boards, setCurrentBoard, setView, setShowTutorial, setUser, setMagicUnlocked }) => {
            const [filterSubj, setFilterSubj] = useState('');
            const [filterGrade, setFilterGrade] = useState('');

            const filteredBoards = boards.filter(b => {
                if (filterSubj && !b.subjects.includes(filterSubj)) return false;
                if (filterGrade && !b.grades.includes(filterGrade)) return false;
                return true;
            });

            return (
                <div className="max-w-4xl mx-auto p-4 pt-8 pb-20">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-3xl font-bold text-white drop-shadow-md">看板大廳</h1>
                            <p className="text-white/90 font-bold mt-1">哈囉，{user}！選擇一個主題開始吧。</p>
                        </div>
                        <div className="flex gap-2">
                            <Button onClick={() => setShowTutorial(true)} variant="outline" className="bg-white/50 border-white text-white hover:bg-white hover:text-serenity shadow-sm"><Icons.Help /> 新手指南</Button>
                            <Button onClick={() => {setUser(null); setMagicUnlocked(false);}} variant="secondary" className="bg-white/50 shadow-sm border-none">登出</Button>
                        </div>
                    </div>

                    <Card className="mb-6 bg-white/80 border border-white/40 shadow-md">
                        <div className="flex flex-wrap gap-4 items-center">
                            <span className="font-bold text-gray-700 bg-white/50 px-2 py-1 rounded">🔍 篩選看板：</span>
                            <select value={filterSubj} onChange={e => setFilterSubj(e.target.value)} className="p-2 rounded-lg border-2 border-quartz bg-white outline-none font-bold text-gray-600 focus:border-serenity min-w-[120px]">
                                <option value="">所有科目</option>
                                {Array.from(new Set(boards.flatMap(b => b.subjects))).map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                            <select value={filterGrade} onChange={e => setFilterGrade(e.target.value)} className="p-2 rounded-lg border-2 border-quartz bg-white outline-none font-bold text-gray-600 focus:border-serenity min-w-[120px]">
                                <option value="">所有年級</option>
                                {Array.from(new Set(boards.flatMap(b => b.grades))).map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                            {(filterSubj || filterGrade) && (
                                <Button onClick={() => {setFilterSubj(''); setFilterGrade('');}} variant="outline" className="py-1.5 px-4 border-gray-400 text-gray-600 bg-white/50 hover:bg-gray-100">清除篩選</Button>
                            )}
                        </div>
                    </Card>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        {filteredBoards.length === 0 ? (
                            <div className="col-span-full text-center py-16 bg-white/30 rounded-2xl border border-white/40">
                                <span className="text-4xl mb-4 block">🔍</span>
                                <span className="text-white/90 font-bold text-lg">目前沒有符合的看板喔！</span>
                            </div>
                        ) : (
                            filteredBoards.map(board => {
                                const isExpired = board.expiryDate && new Date(board.expiryDate) < new Date();
                                const tempName = TEMPLATES[board.templateId || 'ORID']?.name || '未知模板';
                                return (
                                    <Card key={board.id} className="hover:shadow-xl transition-all hover:-translate-y-1 cursor-pointer flex flex-col justify-between border-b-4 border-b-serenity group" >
                                        <div onClick={() => { setCurrentBoard(board); setView('board'); }}>
                                            <div className="flex justify-between items-start mb-3">
                                                <h2 className="text-xl font-bold text-gray-800 group-hover:text-serenity transition-colors truncate max-w-[70%]" title={board.title}>{board.title}</h2>
                                                {isExpired ? (
                                                    <span className="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded-md font-bold whitespace-nowrap shadow-sm border border-gray-300">僅供觀看</span>
                                                ) : (
                                                    <span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-md font-bold whitespace-nowrap shadow-sm border border-green-200">開放討論中</span>
                                                )}
                                            </div>
                                            <div className="mb-3">
                                                <span className="text-xs bg-serenity/10 text-serenity px-2 py-1 rounded-md font-bold border border-serenity/20 inline-flex items-center gap-1"><Icons.Layout /> {tempName}</span>
                                            </div>
                                            <div className="flex flex-wrap gap-1.5 mb-4">
                                                {board.subjects.map(s => <span key={s} className="text-xs bg-blue-50 text-blue-600 px-2 py-0.5 rounded border border-blue-100">{s}</span>)}
                                                {board.grades.map(s => <span key={s} className="text-xs bg-pink-50 text-pink-600 px-2 py-0.5 rounded border border-pink-100">{s}</span>)}
                                            </div>
                                        </div>
                                        <div className="text-right mt-auto pt-3 border-t border-gray-100">
                                            <Button onClick={() => { setCurrentBoard(board); setView('board'); }} variant="secondary" className="w-full py-2 bg-gray-50 border border-gray-200 group-hover:bg-serenity group-hover:text-white group-hover:border-serenity transition-colors">進入看板</Button>
                                        </div>
                                    </Card>
                                );
                            })
                        )}
                    </div>
                </div>
            );
        };

        const BoardView = ({ user, currentBoard, responses, setView, setCurrentBoard, magicUnlocked, setMagicUnlocked, adminPwd, setEditingTargetId, showAlert, showPrompt, saveResponse, deleteResponse, showConfirm }) => {
            const boardResponses = responses.filter(r => r.boardId === currentBoard.id);
            const isExpired = currentBoard.expiryDate && new Date(currentBoard.expiryDate) < new Date();
            const myResponse = boardResponses.find(r => r.studentName === user);
            
            const templateId = currentBoard.templateId || 'ORID';
            const templateConfig = TEMPLATES[templateId];
            const fields = currentBoard.fields || templateConfig.defaultFields;
            const getAnswers = (responseObj) => {
                if (responseObj.answers) return responseObj.answers;
                return { O: responseObj.O, R: responseObj.R, I: responseObj.I, D: responseObj.D };
            };

            const handleAddOrEdit = () => {
                if (isExpired && user !== 'admin') return showAlert('此看板已截止，無法新增或編輯。');
                setEditingTargetId(null); setView('form');
            };

            const unlockMagic = () => {
                showPrompt('請輸入老師專用魔法密碼：', (pwd) => {
                    if (pwd === adminPwd) { setMagicUnlocked(true); showAlert('魔法解鎖成功！您現在可以編輯任何人的留言。'); } 
                    else { showAlert('密碼錯誤！解鎖失敗。'); }
                }, '', 'password');
            };

            return (
                <div className="max-w-5xl mx-auto p-4 pt-8 pb-20">
                    <div className="flex justify-between items-center mb-6">
                        <Button onClick={() => {setView(user === 'admin' ? 'admin' : 'dashboard'); setCurrentBoard(null);}} variant="outline" className="bg-white/50 border-white text-white hover:bg-white hover:text-serenity shadow-sm">
                            <Icons.Home /> {user === 'admin' ? '回到後台' : '回大廳'}
                        </Button>
                        <h1 className="text-3xl font-bold text-white drop-shadow-md text-center flex-1 mx-4 truncate">{currentBoard.title}</h1>
                        <div className="w-[100px]"></div>
                    </div>

                    <div className="bg-white/90 backdrop-blur rounded-2xl p-5 mb-6 flex justify-between items-center shadow-lg border-t-4 border-t-serenity">
                        <div className="flex items-center gap-4">
                            <span className="bg-blue-50 text-blue-800 px-3 py-1.5 rounded-lg font-bold border border-blue-100 flex items-center gap-2">
                                👥 參與人數 <span className="bg-white px-2 py-0.5 rounded shadow-sm">{boardResponses.length}</span>
                            </span>
                            {isExpired && <span className="text-red-600 font-bold text-sm bg-red-100 px-3 py-1.5 rounded-lg border border-red-200">⛔ 已截止討論</span>}
                        </div>
                        <div className="flex gap-3">
                            <button onClick={unlockMagic} className="text-gray-400 hover:text-yellow-500 p-2 bg-gray-50 rounded-lg hover:bg-yellow-50 border border-transparent hover:border-yellow-200 transition-colors" title="呼叫老師魔法 (解鎖編輯他人權限)">
                                <Icons.Unlock />
                            </button>
                            {!isExpired && (
                                <Button onClick={handleAddOrEdit} variant="primary" className="shadow-md px-6 py-2.5">
                                    {myResponse ? '📝 修改我的想法' : '➕ 新增我的想法'}
                                </Button>
                            )}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 gap-6">
                        {boardResponses.length === 0 ? (
                            <div className="text-center py-20 bg-white/20 rounded-2xl border-2 border-dashed border-white/50">
                                <span className="text-5xl block mb-4">✍️</span>
                                <span className="text-white/90 text-xl font-bold">還沒有人留言喔，趕快搶頭香！</span>
                            </div>
                        ) : (
                            boardResponses.map(r => (
                                <Card key={r.id} className="relative overflow-hidden group shadow-md hover:shadow-xl transition-shadow border border-gray-100">
                                    {(user === 'admin' || user === r.studentName || magicUnlocked) && !isExpired && (
                                        <div className="absolute top-4 right-4 z-10 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity bg-white/90 p-1.5 rounded-lg shadow-sm border border-gray-200">
                                            <Button onClick={() => { setEditingTargetId(r.id); setView('form'); }} variant="outline" className="text-xs py-1.5 px-3 bg-white">編輯</Button>
                                            {user === 'admin' && (
                                                <Button onClick={() => {
                                                    showConfirm(`確定要刪除 ${r.studentName} 的這筆留言嗎？`, async () => {
                                                        try { await deleteResponse(r.id); showAlert('留言已刪除。'); } 
                                                        catch (err) { showAlert(`刪除失敗：${err.message}`); }
                                                    });
                                                }} variant="danger" className="text-xs py-1.5 px-3 shadow-sm border border-red-500">刪除</Button>
                                            )}
                                        </div>
                                    )}
                                    <div className="flex items-center gap-3 mb-5 border-b-2 border-quartz pb-3">
                                        <div className="w-12 h-12 rounded-full bg-gradient-to-br from-serenity to-blue-400 text-white flex items-center justify-center font-bold text-2xl shadow-inner">
                                            {r.studentName.charAt(0)}
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-gray-800">{r.studentName} <span className="text-sm font-normal text-gray-500 ml-1">的想法</span></h3>
                                            <span className="text-xs text-gray-400">{new Date(r.timestamp).toLocaleString()}</span>
                                        </div>
                                    </div>
                                    
                                    <div className={`grid gap-4 ${templateConfig.layout}`}>
                                        {fields.map(field => {
                                            const ans = getAnswers(r)[field.id] || { level1: '', level2: '', level3: '', stage: 'raw', imageUrl: null };
                                            if(!ans.level3 && !ans.imageUrl && user !== 'admin') return null; // 學生不顯示空欄位
                                            return (
                                                <div key={field.id} className={`bg-gray-50 rounded-xl p-4 border border-gray-200 shadow-sm ${templateId === 'MANDALA' && field.id === 'M5' ? 'ring-2 ring-serenity bg-blue-50/50' : ''}`}>
                                                    <div className="flex justify-between items-start mb-3 border-b border-gray-200 pb-2">
                                                        <span className={`font-bold px-2 py-1 rounded text-sm shadow-sm ${templateId === 'MANDALA' && field.id === 'M5' ? 'bg-serenity text-white' : 'bg-blue-100 text-blue-800 border border-blue-200'}`}>{field.title}</span>
                                                        <button onClick={() => TTS.speak(ans.level3)} className="text-gray-400 hover:text-serenity bg-white rounded-full p-1 shadow-sm"><Icons.Speaker /></button>
                                                    </div>
                                                    {ans.level3 ? (
                                                        <p className="text-gray-700 whitespace-pre-wrap leading-relaxed">{ans.level3}</p>
                                                    ) : (
                                                        <p className="text-gray-400 text-sm italic">未填寫文字內容</p>
                                                    )}
                                                    {ans.imageUrl && (
                                                        <div className="mt-3 text-center bg-white p-2 rounded-lg border border-gray-200 shadow-sm">
                                                            <img src={ans.imageUrl} alt="Student uploaded" className="max-h-64 mx-auto rounded-md" />
                                                        </div>
                                                    )}
                                                    
                                                    {user === 'admin' && ans.level1 && (
                                                        <div className="mt-4 text-xs bg-gray-100 p-3 rounded-lg border border-gray-300">
                                                            <div className="font-bold text-gray-700 mb-1.5 border-b border-gray-200 pb-1 flex items-center gap-1">👀 歷程分析</div>
                                                            {!ans.stage || ans.stage === 'raw' ? (
                                                                <div className="text-gray-500">純手動輸入 (無使用 AI)</div>
                                                            ) : (
                                                                <div className="space-y-1.5 mt-1">
                                                                    <div className="text-gray-500"><span className="font-bold">1. 原始內容:</span> {ans.level1}</div>
                                                                    <div className="text-blue-600"><span className="font-bold">2. AI {ans.stage === 'summary' ? '摘要' : '條列'}:</span> {ans.level2}</div>
                                                                    {(ans.level2 || '').trim() !== (ans.level3 || '').trim() ? (
                                                                        <div className="text-green-600 font-bold bg-green-50 px-2 py-1 rounded inline-block mt-1">✓ 學生有進一步手動修改 AI 內容</div>
                                                                    ) : (
                                                                        <div className="text-red-500 font-bold bg-red-50 px-2 py-1 rounded inline-block mt-1">⚠ 學生直接套用 AI 內容，未修改</div>
                                                                    )}
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* Feedback Section */}
                                    <div className="mt-5 border-t-2 border-dashed border-gray-200 pt-4">
                                        {user === 'admin' ? (
                                            <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-300 shadow-inner">
                                                <label className="block text-sm font-bold text-yellow-800 mb-2 flex items-center gap-1">
                                                    📝 給 {r.studentName} 的回饋：
                                                </label>
                                                <textarea
                                                    className="w-full p-3 border-2 border-yellow-200 rounded-lg focus:outline-none focus:border-yellow-400 focus:ring-2 focus:ring-yellow-200 bg-white text-gray-800"
                                                    rows="2"

            const templateId = currentBoard.templateId || 'ORID';

            const defaultDim = { level1: '', level2: '', level3: '', stage: 'raw', imageUrl: null };
            const initFormData = () => {
                let data = {};
                if (initialResponse.current) {
                    const oldAns = initialResponse.current.answers || { O: initialResponse.current.O, R: initialResponse.current.R, I: initialResponse.current.I, D: initialResponse.current.D };
                    fields.forEach(f => { data[f.id] = oldAns[f.id] || { ...defaultDim }; });
                } else { fields.forEach(f => { data[f.id] = { ...defaultDim }; }); }
                return data;
            };

            const [formData, setFormData] = useState(initFormData());
            const studentNameForThisForm = initialResponse.current ? initialResponse.current.studentName : user;

            const handleSave = async () => {
                const isDimFilled = (dim) => dim && (dim.level3.trim() !== '' || !!dim.imageUrl);
                let hasAnyData = false;
                for (const key in formData) { if (isDimFilled(formData[key])) { hasAnyData = true; break; } }
                if (!hasAnyData) return showAlert('請至少填寫一個欄位的內容或上傳照片喔！');

                        ...(initialResponse.current || {}),

                        boardId: currentBoard.id,
                        studentName: studentNameForThisForm,
                        answers: formData, 
                        timestamp: new Date().toISOString()

            return (

                            <span className="font-bold text-orange-400">➔</span>
                            <input type="text" placeholder="怎麼唸 (例: 汗)" value={newPron} onChange={e => setNewPron(e.target.value)} className="flex-1 p-2 border-2 border-gray-200 rounded-lg text-sm text-center focus:border-orange-400 outline-none font-bold" />
                            <Button onClick={handleAddDict} className="bg-orange-500 hover:bg-orange-600 border-none shrink-0 px-6">新增</Button>
                        </div>
                    </div>
                </div>

        };

        // ==========================================
        // Admin View Main Component
        // ==========================================
        const AdminView = ({ boards, responses, saveBoard, deleteBoard, saveResponse, setView, setCurrentBoard, setUser, adminPwd, setAdminPwd, fbConfigStr, setFbConfigStr, fbDb, geminiKey, setGeminiKey, tutorialData, saveTutorial, showAlert, showConfirm }) => {
            const [activeTab, setActiveTab] = useState('boards'); 
            const [editingBoard, setEditingBoard] = useState(null);
            
            // Tutorial State
            const parsedTutData = typeof tutorialData === 'string' ? JSON.parse(tutorialData) : tutorialData;
            if (parsedTutData.steps) parsedTutData.steps = parsedTutData.steps.map(step => ({ ...step, visible: step.visible !== false }));
            const [tutForm, setTutForm] = useState(parsedTutData);
            const [loadingAiTut, setLoadingAiTut] = useState(false);
            
            // Board Creation State
            const [selectedTemplate, setSelectedTemplate] = useState('ORID');
            const [boardFields, setBoardFields] = useState(TEMPLATES['ORID'].defaultFields);
            const [customFieldsCount, setCustomFieldsCount] = useState(1);
            const [selectedExportBoards, setSelectedExportBoards] = useState(new Set());
            const [newSubj, setNewSubj] = useState('');
            const [newGrade, setNewGrade] = useState('');
            
            // Modals & Dialogs State
            const [showTeacherGuide, setShowTeacherGuide] = useState(false);
            const [showImportGuide, setShowImportGuide] = useState(false);
            const [importFile, setImportFile] = useState(null); // {file, type}
            const [showImportDialog, setShowImportDialog] = useState(false);

            useEffect(() => {
                if (!localStorage.getItem('hasSeenTeacherGuide')) { setShowTeacherGuide(true); localStorage.setItem('hasSeenTeacherGuide', 'true'); }
                if (!localStorage.getItem('hasSeenImportGuide')) { setShowImportGuide(true); localStorage.setItem('hasSeenImportGuide', 'true'); }
            }, []);

            useEffect(() => { 
                const parsed = typeof tutorialData === 'string' ? JSON.parse(tutorialData) : tutorialData;
                if (parsed.steps) parsed.steps = parsed.steps.map(step => ({ ...step, visible: step.visible !== false }));
                setTutForm(parsed); 
            }, [tutorialData]);

            useEffect(() => {
                if (editingBoard) {
                    const tempId = editingBoard.templateId || 'ORID';
                    setSelectedTemplate(tempId);
                    setBoardFields(editingBoard.fields || TEMPLATES[tempId].defaultFields);
                    if (tempId === 'CUSTOM') setCustomFieldsCount(editingBoard.fields?.length || 1);
                } else {
                    setSelectedTemplate('ORID');
                    setBoardFields(TEMPLATES['ORID'].defaultFields);
                    setCustomFieldsCount(1);
                }
            }, [editingBoard]);

            const handleTemplateChange = (e) => {
                const tempId = e.target.value;
                setSelectedTemplate(tempId);
                if (tempId === 'CUSTOM') handleCustomFieldsCountChange({ target: { value: customFieldsCount } });
                else setBoardFields(JSON.parse(JSON.stringify(TEMPLATES[tempId].defaultFields)));
            };

            const handleCustomFieldsCountChange = (e) => {
                const count = parseInt(e.target.value, 10);
                setCustomFieldsCount(count);
                const newFields = [];
                for (let i = 1; i <= count; i++) {
                    const existingField = boardFields.find(f => f.id === `C${i}`);
                    if (existingField) newFields.push(existingField);
                    else newFields.push({ id: `C${i}`, title: `自訂欄位 ${i}`, guide: '請輸入引導語...' });
                }
                setBoardFields(newFields);
            };

            const handleFieldChange = (id, key, value) => {
                setBoardFields(boardFields.map(f => f.id === id ? { ...f, [key]: value } : f));
            };

            const handleApplyDifficulty = () => {
                const diff = document.querySelector('[name="difficulty"]').value;
                const style = document.querySelector('[name="style"]').value;
                if (PROMPTS_CONFIG[selectedTemplate]) {
                    const prompts = PROMPTS_CONFIG[selectedTemplate][diff][style];
                    const newFields = boardFields.map(f => ({ ...f, guide: prompts[f.id] || f.guide }));
                    setBoardFields(newFields);
                    showAlert(`已套用 ${selectedTemplate} 的 ${diff}-${style} 預設引導語！`);
                } else {
                    showAlert('這個模板目前沒有內建的難度引導語喔！請自訂。');
                }
            };

            const handleSaveBoardForm = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const subjects = fd.getAll('subjects');
                const grades = fd.getAll('grades');
                if(subjects.length === 0 || grades.length === 0) return showAlert('請至少選擇一個科目與年級');
                if (boardFields.some(f => !f.title.trim() || !f.guide.trim())) return showAlert('請確保所有欄位的「標題」與「引導語」都已填寫。');

                const finalSubjects = [...subjects];
                if (fd.get('otherSubjCheckbox') && newSubj.trim()) finalSubjects.push(newSubj.trim());
                
                const finalGrades = [...grades];
                if (fd.get('otherGradeCheckbox') && newGrade.trim()) finalGrades.push(newGrade.trim());

                const newBoard = {
                    id: editingBoard?.id || generateId(),
                    title: fd.get('title'),
                    templateId: selectedTemplate,
                    fields: boardFields,
                    subjects: finalSubjects,
                    grades: finalGrades,
                    difficulty: fd.get('difficulty') || '簡單', 
                    style: fd.get('style') || '一般',         
                    expiryDate: fd.get('expiryDate') || null
                };
                
                try {
                    await saveBoard(newBoard);
                    setEditingBoard(null); setActiveTab('boards');
                } catch (err) { showAlert(`看板儲存失敗：${err.message}`); }
            };

            const escapeCsv = (str) => !str ? '""' : `"${str.toString().replace(/"/g, '""')}"`;

            const getBoardsToExport = () => {
                return selectedExportBoards.size > 0 ? boards.filter(b => selectedExportBoards.has(b.id)) : boards;
            };

            const exportCsv = () => {
                const boardsToExport = getBoardsToExport();
                if (boardsToExport.length === 0) return showAlert("沒有可匯出的看板資料！");
                let csvContent = '\uFEFF主題,科目(以|分隔),適用年級(以|分隔),引導難度,語氣風格,學生姓名,內容1,內容2,內容3,內容4,留言時間,老師回饋\n';
                boardsToExport.forEach(b => {
                    const bResps = responses.filter(r => r.boardId === b.id);
                    if (bResps.length === 0) csvContent += `${escapeCsv(b.title)},${escapeCsv(b.subjects.join('|'))},${escapeCsv(b.grades.join('|'))},${escapeCsv(b.difficulty)},${escapeCsv(b.style)},"","","","","","",""\n`;
                    else bResps.forEach(r => {
                        const ans = r.answers || { O: r.O, R: r.R, I: r.I, D: r.D };
                        let texts = ['', '', '', ''];
                        if (b.templateId && b.templateId !== 'ORID') texts[0] = (b.fields || []).map(f => `[${f.title}] ${ans[f.id]?.level3 || ''}`).join('\n');
                        else { texts[0]=ans.O?.level3||''; texts[1]=ans.R?.level3||''; texts[2]=ans.I?.level3||''; texts[3]=ans.D?.level3||''; }
                        csvContent += `${escapeCsv(b.title)},${escapeCsv(b.subjects.join('|'))},${escapeCsv(b.grades.join('|'))},${escapeCsv(b.difficulty)},${escapeCsv(b.style)},${escapeCsv(r.studentName)},${escapeCsv(texts[0])},${escapeCsv(texts[1])},${escapeCsv(texts[2])},${escapeCsv(texts[3])},${escapeCsv(r.timestamp)},${escapeCsv(r.feedback)}\n`;
                    });
                });
                downloadFile(csvContent, 'csv', '歷史看板資料');
            };

            const exportTxt = () => {
                const boardsToExport = getBoardsToExport();
                if (boardsToExport.length === 0) return showAlert("沒有可匯出的看板資料！");
                let content = '';
                boardsToExport.forEach(b => {
                    content += `====================================\n主題：${b.title}\n科目：${b.subjects.join(', ')}\n年級：${b.grades.join(', ')}\n====================================\n\n`;
                    const bResps = responses.filter(r => r.boardId === b.id);
                    bResps.forEach(r => {
                        content += `學生：${r.studentName}\n`;
                        const ans = r.answers || { O: r.O, R: r.R, I: r.I, D: r.D };
                        (b.fields || TEMPLATES['ORID'].defaultFields).forEach(f => { content += `[${f.title}] ${ans[f.id]?.level3 || ''}\n`; });
                        if (r.feedback) content += `[老師回饋] ${r.feedback}\n`;
                        content += `------------------------------------\n`;
                    }); content += `\n`;
                });
                downloadFile(content, 'txt', '看板資料保存');
            };

            const exportJson = () => {
                const boardsToExport = getBoardsToExport();
                if (boardsToExport.length === 0) return showAlert("沒有可匯出的看板資料！");
                const responsesToExport = selectedExportBoards.size > 0 ? responses.filter(r => selectedExportBoards.has(r.boardId)) : responses;
                const data = { boards: boardsToExport, responses: responsesToExport };
                downloadFile(JSON.stringify(data, null, 2), 'json', '系統備份');
            };

            const downloadFile = (content, ext, suffix) => {
                const blob = new Blob([content], { type: ext === 'json' ? 'application/json' : `text/${ext};charset=utf-8` });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `想法討論板_${suffix}_${new Date().toLocaleDateString()}.${ext}`;
                a.click();
            };

            const triggerImport = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                setImportFile({ file, type });
                setShowImportDialog(true);
                e.target.value = ''; // Reset input
            };

            const handleImportModeSelect = async (mode) => {
                setShowImportDialog(false);
                if (!importFile) return;
                const { file, type } = importFile;
                setImportFile(null);

                try {
                    const text = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = e => resolve(e.target.result);
                        reader.onerror = e => reject(e);
                        reader.readAsText(file);
                    });

                    if (mode === 'overwrite') {
                        if (fbDb) { showAlert("雲端連線模式下為保護資料安全，不允許使用「完全覆蓋」。請改用「合併資料」，若需清空請至 Firebase 控制台操作。"); return; }
                        boards.forEach(b => deleteBoard(b.id)); responses.forEach(r => deleteResponse(r.id));
                    }

                    if (type === 'json') {
                        const data = JSON.parse(text);
                        for (const b of (data.boards || [])) await saveBoard(b);
                        if (mode !== 'boards_only') for (const r of (data.responses || [])) await saveResponse(r);
                        showAlert(`✅ JSON ${mode === 'boards_only' ? '看板模板' : '系統備份'} 匯入成功！`);
                    } else if (type === 'csv') {
                        const rows = parseCSV(text);
                        if (rows.length < 2) throw new Error("CSV 沒有有效資料！");
                        for (let i = 1; i < rows.length; i++) {
                            const r = rows[i]; if (r.length < 5) continue;
                            const title = r[0], subjectsStr = r[1], gradesStr = r[2], difficulty = r[3], style = r[4], studentName = r[5], ts = r[10];
                            if (!title) continue;
                            let board = boards.find(b => b.title === title);
                            if (!board) {
                                board = { id: generateId(), title, templateId: 'ORID', fields: TEMPLATES['ORID'].defaultFields, subjects: subjectsStr ? subjectsStr.split('|') : ['自訂'], grades: gradesStr ? gradesStr.split('|') : ['未指定'], difficulty: difficulty || '簡單', style: style || '一般', expiryDate: null };
                                await saveBoard(board); boards.push(board);
                            }
                            if (mode !== 'boards_only' && studentName) {
                                const mkDim = (val) => ({ level1: val || '', level2: val || '', level3: val || '', stage: 'raw' });
                                await saveResponse({ id: generateId(), boardId: board.id, studentName, answers: { O: mkDim(r[6]), R: mkDim(r[7]), I: mkDim(r[8]), D: mkDim(r[9]) }, timestamp: ts || new Date().toISOString() });
                            }
                        }
                        showAlert(`✅ CSV ${mode === 'boards_only' ? '看板設定' : '歷史資料'} 匯入成功！`);
                    }
                } catch (err) { showAlert("匯入失敗：" + err.message); }
            };

            const generateTutorialWithAI = async () => {
                if (!geminiKey) return showAlert("請先設定 AI 金鑰才能使用此功能！");
                setLoadingAiTut(true);
                try {
                    const prompt = `請幫我為「想法討論板」生成一份專屬給國小學生的新手指南。請以嚴格的 JSON 格式輸出，不要有 markdown 標記。格式如下：\n{ "intro": "開場白...", "steps": [ { "visible": true, "color": "blue", "title": "步驟一、...", "text": "說明內容..." } ] }\n注意：color 只能填 "blue", "pink", "yellow", "green"。請撰寫 4~6 個步驟。在 text 中若提到相關功能，請精準使用代碼標示以轉為圖示：[觀看]、[新增我的想法]、[修改我的想法]、[麥克風]、[相機]、[魔法摘要]、[轉成條列重點]、[送出我的討論單]。`;
                    const result = await callGeminiText(prompt, geminiKey);
                    const parsed = JSON.parse(result.replace(/```json/gi, '').replace(/```/g, '').trim());
                    if (parsed.intro && parsed.steps) { setTutForm(parsed); showAlert("✅ AI 已成功生成新版指南！請手動點擊「儲存指南內容」套用。"); } 
                    else throw new Error("AI 回傳格式不符。");
                } catch (err) { showAlert("AI 生成失敗：" + err.message); }
                setLoadingAiTut(false);
            };

                                                <button onClick={() => setSelectedExportBoards(new Set())} className="text-xs text-blue-600 hover:text-blue-800 underline bg-blue-50 px-2 py-1 rounded">清除選取</button>
                                            </div>
                                            <div className="max-h-40 overflow-y-auto custom-scrollbar pr-2 space-y-1.5">
                                                {boards.length === 0 ? (
                                                    <p className="text-sm text-gray-400 text-center py-4 font-bold">目前無任何看板資料</p>
                                                ) : (
                                                    boards.map(b => (
                                                        <label key={b.id} className="flex items-center gap-3 text-sm cursor-pointer hover:bg-white p-2 rounded-lg border border-transparent hover:border-gray-200 transition-colors">
                                                            <input type="checkbox" checked={selectedExportBoards.has(b.id)} onChange={(e) => { const newSet = new Set(selectedExportBoards); if (e.target.checked) newSet.add(b.id); else newSet.delete(b.id); setSelectedExportBoards(newSet); }} className="w-4 h-4 rounded text-serenity focus:ring-serenity border-gray-300" />
                                                            <span className="truncate font-bold text-gray-700">{b.title}</span>
                                                        </label>
                                                    ))
                                                )}
                                            </div>
                                            <p className="text-xs text-gray-500 mt-3 font-bold bg-white p-2 rounded text-center">※ 若未勾選，將預設匯出「所有」資料。</p>
                                        </div>

                                        <div className="space-y-4">
                                            {/* TXT */}
                                            <div className="bg-gray-50 p-3 rounded-xl border border-gray-200">
                                                <Button onClick={exportTxt} variant="outline" className="w-full text-sm py-2.5 font-bold border-2 bg-white">📄 匯出純文字 (TXT)</Button>
                                            </div>

                                            {/* CSV */}
                                            <div className="bg-green-50 p-4 rounded-xl border border-green-200">
                                                <h3 className="text-sm font-bold text-green-800 mb-3 flex items-center gap-1 border-b border-green-200 pb-2">📊 CSV 試算表格式 (歷史資料)</h3>
                                                <div className="flex flex-col gap-2.5">
                                                    <Button onClick={exportCsv} variant="secondary" className="w-full text-sm py-2.5 bg-white text-green-700 hover:bg-green-100 border-2 border-green-300">匯出 CSV</Button>
                                                    <label className="w-full flex items-center justify-center px-4 py-2.5 rounded-xl font-bold bg-green-600 text-white cursor-pointer hover:bg-green-700 text-sm shadow-md transition-colors transform active:scale-95">
                                                        匯入 CSV <input type="file" accept=".csv" onChange={e=>triggerImport(e,'csv')} className="hidden" />
                                                    </label>
                                                </div>
                                            </div>

                                            {/* JSON */}
                                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-200">
                                                <h3 className="text-sm font-bold text-blue-800 mb-3 flex items-center gap-1 border-b border-blue-200 pb-2">📦 JSON 系統備份格式 (完整還原)</h3>
                                                <div className="flex flex-col gap-2.5">
                                                    <Button onClick={exportJson} variant="secondary" className="w-full text-sm py-2.5 bg-white text-blue-700 hover:bg-blue-100 border-2 border-blue-300">匯出系統備份</Button>
                                                    <label className="w-full flex items-center justify-center px-4 py-2.5 rounded-xl font-bold bg-blue-600 text-white cursor-pointer hover:bg-blue-700 text-sm shadow-md transition-colors transform active:scale-95">
                                                        匯入系統備份 <input type="file" accept=".json" onChange={e=>triggerImport(e,'json')} className="hidden" />
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    </Card>
                                </div>
                                
                                {/* Right Col: Board List */}
                                <div className="lg:col-span-2">
                                    <Card className="shadow-xl h-full border-t-8 border-t-serenity">
                                        <div className="flex justify-between items-center mb-4 border-b border-gray-200 pb-3">
                                            <h2 className="text-xl font-bold text-serenity flex items-center gap-2">
                                                <Icons.List /> 已建立的看板列表
                                            </h2>
                                            <span className="bg-gray-100 text-gray-600 px-3 py-1 rounded-lg font-bold text-sm shadow-sm border border-gray-200">總計：{boards.length} 個</span>
                                        </div>
                                        <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm">
                                            <table className="w-full text-left text-sm whitespace-nowrap">
                                                <thead>
                                                    <tr className="bg-gray-100 text-gray-700">
                                                        <th className="p-4 font-bold border-b border-gray-200">看板主題</th>
                                                        <th className="p-4 font-bold border-b border-gray-200">模板與狀態</th>
                                                        <th className="p-4 font-bold border-b border-gray-200">適用科目/年級</th>
                                                        <th className="p-4 font-bold border-b border-gray-200 text-center">資料統計</th>
                                                        <th className="p-4 font-bold border-b border-gray-200 text-center">快速操作</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="bg-white divide-y divide-gray-100">
                                                    {boards.map(b => {
                                                        const count = responses.filter(r => r.boardId === b.id).length;
                                                        const expired = b.expiryDate && new Date(b.expiryDate) < new Date();
                                                        const tempName = TEMPLATES[b.templateId || 'ORID']?.name || '未知';
                                                        return (
                                                            <tr key={b.id} className="hover:bg-blue-50/50 transition-colors group">
                                                                <td className="p-4">
                                                                    <div className="font-bold text-gray-800 max-w-[200px] truncate text-base mb-1" title={b.title}>{b.title}</div>
                                                                    <div className="text-xs text-gray-400 font-mono">ID: {b.id.substring(0,6)}...</div>
                                                                </td>
                                                                <td className="p-4 space-y-2">
                                                                    <div><span className="bg-blue-50 text-blue-700 border border-blue-200 rounded-md px-2 py-0.5 text-xs font-bold shadow-sm">{tempName}</span></div>
                                                                    <div>{expired ? <span className="text-red-600 font-bold text-xs bg-red-50 border border-red-200 px-2 py-0.5 rounded-md shadow-sm">已截止</span> : <span className="text-green-700 font-bold text-xs bg-green-50 border border-green-200 px-2 py-0.5 rounded-md shadow-sm">開放中</span>}</div>
                                                                </td>
                                                                <td className="p-4">
                                                                    <div className="text-xs text-gray-600 mb-1 max-w-[150px] truncate" title={b.subjects.join(', ')}>📚 {b.subjects.join(', ')}</div>
                                                                    <div className="text-xs text-gray-600 max-w-[150px] truncate" title={b.grades.join(', ')}>🎓 {b.grades.join(', ')}</div>
                                                                </td>
                                                                <td className="p-4 text-center">
                                                                    <div className="inline-flex items-center justify-center bg-gray-50 border border-gray-200 w-10 h-10 rounded-xl text-lg font-bold text-serenity shadow-inner">{count}</div>
                                                                </td>
                                                                <td className="p-4">
                                                                    <div className="flex gap-2 justify-center opacity-70 group-hover:opacity-100 transition-opacity">
                                                                        <button onClick={() => { setCurrentBoard(b); setView('board'); }} className="text-blue-700 bg-blue-50 hover:bg-blue-600 hover:text-white font-bold px-3 py-2 rounded-lg transition-colors border border-blue-200 shadow-sm whitespace-nowrap text-xs">進入</button>
                                                                        <button onClick={() => { setEditingBoard(b); setActiveTab('edit_board'); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="text-yellow-700 bg-yellow-50 hover:bg-yellow-500 hover:text-white font-bold px-3 py-2 rounded-lg transition-colors border border-yellow-200 shadow-sm whitespace-nowrap text-xs">設定</button>
                                                                        <button onClick={() => { showConfirm(`確定刪除「${b.title}」及所有留言？`, async () => { try { await deleteBoard(b.id); } catch (err) { showAlert(err.message); } }); }} className="text-red-600 bg-red-50 hover:bg-red-500 hover:text-white px-3 py-2 rounded-lg transition-colors border border-red-200 shadow-sm" title="刪除"><Icons.Trash /></button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                    {boards.length === 0 && <tr><td colSpan="5" className="text-center py-16 text-gray-400 font-bold text-lg bg-gray-50/50">沒有任何看板資料，請點擊上方「新增看板」。</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // Main App Component Root
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null); 
            const [view, setView] = useState('login'); 
            const [currentBoard, setCurrentBoard] = useState(null);
            
            const [boards, setBoards] = useState([]);
            const [responses, setResponses] = useState([]);
            
            const [showTutorial, setShowTutorial] = useState(false);
            const [magicUnlocked, setMagicUnlocked] = useState(false);
            const [editingTargetId, setEditingTargetId] = useState(null);
            
            const [adminPwd, setAdminPwd] = useState(localStorage.getItem('adminPwd') || DEFAULT_PWD);
            const [fbConfigStr, setFbConfigStr] = useState(localStorage.getItem('fbConfig') || '');
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('geminiKey') || '');
            const [tutorialData, setTutorialData] = useState(localStorage.getItem('offlineTutorial') || JSON.stringify(DEFAULT_TUTORIAL_DATA));
            
            const [fbDb, setFbDb] = useState(null);
            const [dialogData, setDialogData] = useState(null);

            const showAlert = (message) => setDialogData({ type: 'alert', message });
            const showConfirm = (message, onConfirm) => setDialogData({ type: 'confirm', message, onConfirm });
            const showPrompt = (message, onConfirm, defaultValue = '', inputType = 'text') => setDialogData({ type: 'prompt', message, onConfirm, defaultValue, inputType });

            useEffect(() => {
                const initFirebase = async () => {
                    if (fbConfigStr) {
                        try {
                            let cleanStr = fbConfigStr.trim();
                            const match = cleanStr.match(/\{([\s\S]*)\}/);
                            cleanStr = match ? '{' + match[1] + '}' : '{' + cleanStr + '}';
                            let config;
                            try { config = JSON.parse(cleanStr); } catch (e) { config = new Function("return " + cleanStr)(); }
                            if (!config || !config.apiKey) throw new Error("設定檔內找不到 apiKey");

                            if (!firebase.apps.length) firebase.initializeApp(config);
                            await firebase.auth().signInAnonymously();
                            setFbDb(firebase.firestore());
                        } catch (e) {
                            setFbDb(null);
                            let errorMsg = e.message;
                            if (e.code === 'auth/configuration-not-found' || e.code === 'auth/operation-not-allowed') errorMsg = "您忘記在 Firebase 控制台開啟「匿名登入」功能了！";
                            showAlert("Firebase 連線設定錯誤，已切回單機模式。\n\n錯誤：" + errorMsg);
                        }
                    } else {
                        setFbDb(null);
                        setBoards(JSON.parse(localStorage.getItem('offlineBoards') || '[]'));
                        setResponses(JSON.parse(localStorage.getItem('offlineResponses') || '[]'));
                        setTutorialData(localStorage.getItem('offlineTutorial') || JSON.stringify(DEFAULT_TUTORIAL_DATA));
                    }
                };
                initFirebase();
            }, [fbConfigStr]);

            useEffect(() => {
                if (!fbDb) return;
                const bsRef = fbDb.collection('artifacts').doc(APP_ID).collection('public_data').doc('orid_app').collection('boards');
                const unsubB = bsRef.onSnapshot(snap => { const b = snap.docs.map(d => ({ id: d.id, ...d.data() })); setBoards(b); localStorage.setItem('offlineBoards', JSON.stringify(b)); });
                
                const rsRef = fbDb.collection('artifacts').doc(APP_ID).collection('public_data').doc('orid_app').collection('responses');
                const unsubR = rsRef.onSnapshot(snap => { const r = snap.docs.map(d => ({ id: d.id, ...d.data() })); setResponses(r); localStorage.setItem('offlineResponses', JSON.stringify(r)); });

                const setRef = fbDb.collection('artifacts').doc(APP_ID).collection('public_data').doc('orid_app').collection('settings').doc('global');
                const unsubS = setRef.onSnapshot(doc => { if (doc.exists && doc.data().tutorialText) { setTutorialData(doc.data().tutorialText); localStorage.setItem('offlineTutorial', doc.data().tutorialText); } });

                return () => { unsubB(); unsubR(); unsubS(); };
            }, [fbDb]);

            const saveBoard = async (boardData) => {
                if (!boardData.id) boardData.id = generateId();
                if (fbDb) await withTimeout(fbDb.collection('artifacts').doc(APP_ID).collection('public_data').doc('orid_app').collection('boards').doc(boardData.id).set(boardData, { merge: true }));
                else { const nb = [...boards]; const i = nb.findIndex(b => b.id === boardData.id); if (i >= 0) nb[i] = boardData; else nb.push(boardData); setBoards(nb); localStorage.setItem('offlineBoards', JSON.stringify(nb)); }
            };

            const deleteBoard = async (id) => {
                if (fbDb) await withTimeout(fbDb.collection('artifacts').doc(APP_ID).collection('public_data').doc('orid_app').collection('boards').doc(id).delete());
                else { const nb = boards.filter(b => b.id !== id); setBoards(nb); localStorage.setItem('offlineBoards', JSON.stringify(nb)); }
            };

            const saveResponse = async (responseData) => {
                if (!responseData.id) responseData.id = generateId(); 
                if (fbDb) await withTimeout(fbDb.collection('artifacts').doc(APP_ID).collection('public_data').doc('orid_app').collection('responses').doc(responseData.id).set(responseData, { merge: true }));
                else { const nr = [...responses]; const i = nr.findIndex(r => r.id === responseData.id); if (i >= 0) nr[i] = responseData; else nr.push(responseData); setResponses(nr); localStorage.setItem('offlineResponses', JSON.stringify(nr)); }
            };

            const deleteResponse = async (id) => {
                if (fbDb) await withTimeout(fbDb.collection('artifacts').doc(APP_ID).collection('public_data').doc('orid_app').collection('responses').doc(id).delete());
                else { const nr = responses.filter(r => r.id !== id); setResponses(nr); localStorage.setItem('offlineResponses', JSON.stringify(nr)); }
            };

            const saveTutorial = async (jsonStr) => {
                if (fbDb) await withTimeout(fbDb.collection('artifacts').doc(APP_ID).collection('public_data').doc('orid_app').collection('settings').doc('global').set({ tutorialText: jsonStr }, { merge: true }));
                else { localStorage.setItem('offlineTutorial', jsonStr); setTutorialData(jsonStr); }
                showAlert('新手指南內容已成功更新！');
            };

            return (
                <React.Fragment>
                    <CustomDialog dialog={dialogData} onClose={() => setDialogData(null)} />
                    {showTutorial && <TutorialModal onClose={() => setShowTutorial(false)} user={user} tutorialData={tutorialData} />}
                    {(!user) ? <LoginView setUser={setUser} setView={setView} setShowTutorial={setShowTutorial} adminPwd={adminPwd} showAlert={showAlert} /> :
                     (view === 'admin') ? <AdminView boards={boards} responses={responses} saveBoard={saveBoard} saveResponse={saveResponse} deleteBoard={deleteBoard} setView={setView} setCurrentBoard={setCurrentBoard} setUser={setUser} adminPwd={adminPwd} setAdminPwd={setAdminPwd} fbConfigStr={fbConfigStr} setFbConfigStr={setFbConfigStr} fbDb={fbDb} geminiKey={geminiKey} setGeminiKey={setGeminiKey} tutorialData={tutorialData} saveTutorial={saveTutorial} showAlert={showAlert} showConfirm={showConfirm} /> :
                     (view === 'dashboard') ? <DashboardView user={user} boards={boards} setCurrentBoard={setCurrentBoard} setView={setView} setShowTutorial={setShowTutorial} setUser={setUser} setMagicUnlocked={setMagicUnlocked} /> :
                     (view === 'board' && currentBoard) ? <BoardView user={user} currentBoard={currentBoard} responses={responses} setView={setView} setCurrentBoard={setCurrentBoard} magicUnlocked={magicUnlocked} setMagicUnlocked={setMagicUnlocked} adminPwd={adminPwd} setEditingTargetId={setEditingTargetId} showAlert={showAlert} showPrompt={showPrompt} saveResponse={saveResponse} deleteResponse={deleteResponse} showConfirm={showConfirm} /> :
                     (view === 'form' && currentBoard) ? <FormView user={user} currentBoard={currentBoard} responses={responses} setView={setView} saveResponse={saveResponse} geminiKey={geminiKey} editingTargetId={editingTargetId} setShowTutorial={setShowTutorial} showAlert={showAlert} /> :
                     <LoginView setUser={setUser} setView={setView} setShowTutorial={setShowTutorial} adminPwd={adminPwd} showAlert={showAlert} />}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
